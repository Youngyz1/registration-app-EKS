apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: registration-app
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 101  # CHANGED: nginx group
      containers:
        - name: frontend
          image: youngyz1/registration-frontend:e14c7bfe7992b46614dfe4351dfd405d145f1f43
          ports:
            - containerPort: 80
          
          # ADDED: Volume mounts for writable directories
          volumeMounts:
          - name: nginx-cache
            mountPath: /var/cache/nginx
          - name: nginx-run
            mountPath: /var/run
          - name: nginx-log
            mountPath: /var/log/nginx
          
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      
      # ADDED: Volumes for temporary directories
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-log
        emptyDir: {}