apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: registration-app
type: Opaque
stringData:
  DB_USER: "dbadmin"
  DB_PASSWORD: "changeme-strong-password"
  DB_NAME: "appdb"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DATABASE_URL: "postgresql://dbadmin:changeme-strong-password@postgres-service:5432/appdb"
  JWT_SECRET_KEY: "changeme-jwt-secret-key"
  POSTGRES_USER: "dbadmin"
  POSTGRES_PASSWORD: "changeme-strong-password"
  POSTGRES_DB: "appdb"
