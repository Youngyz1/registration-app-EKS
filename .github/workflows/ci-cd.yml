name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: youngyz1/registration-backend
  FRONTEND_IMAGE: youngyz1/registration-frontend

permissions:
  contents: write
  security-events: write

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.projectKey=Youngyz1_registration-app-EKS
            -Dsonar.organization=youngyz1
            -Dsonar.sources=backend,frontend/src
            -Dsonar.python.version=3.9
            -Dsonar.exclusions=**/node_modules/**,**/venv/**,**/__pycache__/**,**/build/**

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

  scan-backend:
    name: Scan Backend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif

      - name: Check for unfixed CRITICAL vulns only
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  scan-frontend:
    name: Scan Frontend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-frontend.sarif

      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif

      - name: Check for unfixed CRITICAL vulns only
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          exit-code: 0
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [scan-backend, scan-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: aws eks update-kubeconfig --region us-east-1 --name registration-app-eks
      - uses: azure/setup-helm@v3
      
      - name: Deploy
        run: |
          helm upgrade registration-app helm/registration-app/ \
            -f helm/registration-app/values.yaml \
            -n registration-app \
            --install \
            --wait

      - name: Verify
        run: |
          kubectl get pods -n registration-app
          kubectl get svc -n registration-app
          kubectl get ingress -n registration-app

  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "${{ job.status == 'success' && ' Deployment successful!' || ' Pipeline failed' }}"
          fields: repo,message,commit,author,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

