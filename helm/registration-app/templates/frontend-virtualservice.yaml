apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
spec:
  hosts:
  - "*"
  gateways:
  - registration-gateway
  http:
  - route:
    - destination:
        host: frontend-service
        port:
          number: {{ .Values.frontend.service.port }}