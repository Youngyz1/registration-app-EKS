{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: {{ .Values.namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: {{ .Values.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.externalSecrets.roleArn }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: registration-app-secrets
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: registration-app-secrets
    creationPolicy: Owner
  data:
  - secretKey: dbUser
    remoteRef:
      key: registration-app/secrets
      property: dbUser
  - secretKey: dbPassword
    remoteRef:
      key: registration-app/secrets
      property: dbPassword
  - secretKey: jwtSecretKey
    remoteRef:
      key: registration-app/secrets
      property: jwtSecretKey
{{- end }}
