apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registration-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Youngyz1/registration-app-EKS.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: registration-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
